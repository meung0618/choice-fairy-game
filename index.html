<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>선택 요정이 되어 해련이의 합리적 선택을 도와라!</title>

  <style>
    :root {
      --bg: #f7f3ea;
      --card: #fffdf8;
      --line: #222222;
      --soft: #efe4d0;
      --soft2: #f8f1e6;
      --text: #222222;
      --good: #dcefd8;
      --bad: #f1d6d6;
      --bar: #3f3a34;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 18px 44px;
    }

    .top {
      border: 3px solid var(--line);
      background: var(--card);
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 5px 5px 0 var(--line);
    }

    .project-label {
      display: inline-block;
      border: 2px solid var(--line);
      background: var(--soft);
      padding: 6px 10px;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.3;
    }

    .sub {
      margin: 10px 0 0;
      line-height: 1.7;
      font-size: 15px;
    }

    .layout {
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 18px;
      align-items: start;
    }

    .side {
      border: 3px solid var(--line);
      background: var(--card);
      padding: 16px;
      box-shadow: 5px 5px 0 var(--line);
      position: sticky;
      top: 18px;
    }

    .character-frame {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 3px solid var(--line);
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .character-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .fallback-character {
      font-size: 64px;
      display: none;
    }

    .name-tag {
      margin-top: 10px;
      border: 2px solid var(--line);
      background: var(--soft);
      padding: 8px;
      text-align: center;
      font-weight: 800;
    }

    .player-tag {
      margin-top: 10px;
      border: 2px solid var(--line);
      background: white;
      padding: 8px;
      text-align: center;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.5;
    }

    .score-mini {
      margin-top: 12px;
      border: 2px solid var(--line);
      padding: 10px;
      text-align: center;
      background: var(--soft2);
      font-weight: 800;
    }

    .score-mini strong {
      display: block;
      font-size: 28px;
      margin-top: 4px;
    }

    .sound-btn {
      margin-top: 10px;
      width: 100%;
      box-shadow: none;
      font-size: 13px;
      padding: 8px;
      background: white;
    }

    .card {
      border: 3px solid var(--line);
      background: var(--card);
      padding: 20px;
      box-shadow: 5px 5px 0 var(--line);
      min-height: 560px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 25px;
    }

    h3 {
      margin: 18px 0 10px;
      font-size: 19px;
    }

    p {
      line-height: 1.75;
    }

    .speech {
      border: 3px solid var(--line);
      background: white;
      padding: 16px;
      margin: 14px 0;
      line-height: 1.75;
    }

    .story-box,
    .info-box {
      border: 2px solid var(--line);
      background: var(--soft2);
      padding: 15px;
      margin: 14px 0;
      line-height: 1.75;
    }

    .notice {
      display: inline-block;
      border: 2px solid var(--line);
      background: var(--soft);
      padding: 6px 10px;
      font-weight: 800;
      margin-top: 8px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 18px 0;
    }

    input {
      border: 2px solid var(--line);
      background: white;
      padding: 12px;
      font-size: 16px;
      font-family: inherit;
      min-width: 220px;
    }

    button {
      cursor: pointer;
      border: 3px solid var(--line);
      background: var(--soft);
      padding: 11px 15px;
      font-family: inherit;
      font-weight: 800;
      font-size: 15px;
      box-shadow: 3px 3px 0 var(--line);
    }

    button:hover {
      transform: translate(1px, 1px);
      box-shadow: 2px 2px 0 var(--line);
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .ghost-btn {
      background: white;
    }

    details {
      border: 2px solid var(--line);
      background: white;
      margin: 14px 0;
      padding: 12px;
    }

    summary {
      cursor: pointer;
      font-weight: 900;
      font-size: 16px;
    }

    .concept-grid {
      display: grid;
      grid-template-columns: 150px 1fr;
      border-top: 2px solid var(--line);
      border-left: 2px solid var(--line);
      margin-top: 12px;
    }

    .concept-grid div {
      border-right: 2px solid var(--line);
      border-bottom: 2px solid var(--line);
      padding: 10px;
      line-height: 1.6;
    }

    .concept-grid .term {
      background: var(--soft2);
      font-weight: 800;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      background: white;
      font-size: 14px;
    }

    th,
    td {
      border: 2px solid var(--line);
      padding: 8px;
      text-align: center;
      vertical-align: middle;
    }

    th {
      background: var(--soft);
    }

    td input {
      width: 100%;
      min-width: 80px;
      padding: 8px;
      text-align: center;
      font-size: 14px;
    }

    .feedback {
      border: 3px solid var(--line);
      padding: 14px;
      margin: 14px 0;
      line-height: 1.7;
      background: white;
    }

    .feedback.good {
      background: var(--good);
    }

    .feedback.bad {
      background: var(--bad);
    }

    .choice-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .choice-btn {
      width: 100%;
      text-align: left;
      background: white;
      box-shadow: none;
      border: 2px solid var(--line);
      line-height: 1.7;
    }

    .choice-btn.selected-good {
      background: var(--good);
      border-width: 3px;
    }

    .choice-btn.selected-bad {
      background: var(--bad);
      border-width: 3px;
    }

    .progress {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-bottom: 18px;
    }

    .progress div {
      border: 2px solid var(--line);
      padding: 7px;
      background: white;
      text-align: center;
      font-size: 12px;
      font-weight: 800;
    }

    .progress .on {
      background: var(--soft);
    }

    .challenge-label {
      display: inline-block;
      border: 2px solid var(--line);
      background: var(--soft);
      padding: 6px 10px;
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .card-question {
      border: 3px solid var(--line);
      background: white;
      padding: 22px;
      margin: 18px 0;
      text-align: center;
      font-size: 22px;
      font-weight: 900;
      line-height: 1.6;
    }

    .mini-status {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      border: 2px solid var(--line);
      background: white;
      padding: 10px;
      font-size: 14px;
      font-weight: 800;
    }

    .gauge-wrap {
      margin: 28px 0 16px;
      border: 3px solid var(--line);
      background: white;
      padding: 8px;
    }

    .gauge {
      height: 32px;
      width: 0%;
      background: var(--bar);
      transition: width 1.5s ease-out;
    }

    .score-big {
      text-align: center;
      font-size: 34px;
      font-weight: 900;
      margin: 18px 0;
    }

    .badge {
      display: none;
      text-align: center;
      border: 3px solid var(--line);
      background: var(--soft);
      padding: 18px;
      margin: 18px 0;
      font-size: 24px;
      font-weight: 900;
      animation: pop 0.45s ease-out;
    }

    @keyframes pop {
      0% {
        transform: scale(0.85);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .ranking-table {
      margin-top: 14px;
    }

    .small {
      font-size: 14px;
      color: #555;
    }

    @media (max-width: 760px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .side {
        position: static;
      }

      .character-frame {
        max-width: 180px;
        margin: 0 auto;
      }

      h1 {
        font-size: 24px;
      }

      .progress {
        grid-template-columns: repeat(2, 1fr);
      }

      table {
        font-size: 12px;
      }

      th,
      td {
        padding: 5px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <section class="top">
      <div class="project-label">창의문제해결 프로젝트</div>
      <h1>선택 요정이 되어 해련이의 합리적 선택을 도와라!</h1>
      <p class="sub">
        고등학교 경제 과목 「경제생활과 합리적 선택」 모의 선택 활동 게임

      <main id="screen" class="card"></main>
    </div>
  </div>

    const conceptCards = [

    const conceptTerms = [

    const missions = [
      {

        story:

          },

            feedback:
              "굶기는 명시적 비용이 없지만, 배고픔과 수업 집중력 저하라는 포기 비용이 크다. 가장 싼 선택이 항상 합리적인 것은 아니다."
          }

      },
      {

        story:
          "해련이는 친구와 영화를 보러 갔는데, 영화가 30분쯤 지나자 너무 재미없다. 이미 낸 영화표 8,000원의 환불은 불가능하다. 매몰 비용의 의미를 떠올려 두 가지 선택지를 비교해 보자.",
        notice:

        best: "보지 않고 나오기",
        options: [
          {
            name: "끝까지 보기",
            benefit: 5000,

            opportunity: 8000,
            net: -3000,

            feedback:
              "끝까지 보기는 이미 낸 돈이 아깝다는 생각에 끌린 선택이지만, 영화표 값은 매몰 비용이다. 현재 선택에서는 앞으로의 편익과 기회비용을 비교해야 한다."
          },
          {
            name: "보지 않고 나오기",
            benefit: 8000,
            explicit: 0,
            implicit: 5000,
            opportunity: 5000,
            net: 3000,
            rational: true,
            feedback:
              "보지 않고 나오기는 이미 낸 돈에 얽매이지 않고 앞으로의 시간 활용을 고려한 선택이다. 순편익이 +3,000원으로 가장 크다."
          }
        ]
      }

    const reviewQuestions = [
      {
        question: "가장 싼 선택이 항상 합리적인 선택일까?",
        points: 5,
        choices: [
          {
            text: "그렇다. 돈을 가장 적게 쓰는 선택이므로 항상 합리적이다.",
            correct: false
          },
          {
            text: "아니다. 편익과 기회비용을 함께 비교했을 때 순편익이 가장 큰 선택이 합리적이다.",
            correct: true
          }
        ]
      },
      {
        question: "이미 쓴 돈이 아깝다는 이유로 계속 선택을 유지하는 것은 합리적일까?",
        points: 4,
        choices: [
          {
            text: "아니다. 이미 회수할 수 없는 매몰 비용에 얽매이지 않고 현재의 편익과 기회비용을 비교해야 한다.",
            correct: true
          },
          {
            text: "그렇다. 이미 돈을 냈다면 손해를 보지 않기 위해 반드시 끝까지 유지해야 한다.",
            correct: false
          }
        ]
      },
      {
        question: "해련이의 상황이 바뀐다면 합리적 선택도 달라질 수 있을까?",
        points: 4,
        choices: [
          {
            text: "그렇다. 가진 용돈, 시간, 새로운 선택지 등 조건이 달라지면 순편익도 달라질 수 있다.",
            correct: true
          },
          {
            text: "아니다. 한 번 합리적인 선택으로 정해진 것은 어떤 상황에서도 항상 그대로 유지된다.",
            correct: false
          }
        ]
      }
    ];

    const screen = document.getElementById("screen");
    const scoreNow = document.getElementById("scoreNow");
    const fairyNow = document.getElementById("fairyNow");

    function makeFairyName(name) {
      return name.endsWith("요정") ? name : name + " 요정";
    }

    function toggleSound() {
      soundOn = !soundOn;
      const btn = document.getElementById("soundToggle");
      if (btn) {
        btn.textContent = soundOn ? "🔊 효과음 켜짐" : "🔇 효과음 꺼짐";
      }
    }

    function playTone(type) {
      if (!soundOn) return;

      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;

      if (!audioCtx) {
        audioCtx = new AudioContext();
      }

      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }

      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();

      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      if (type === "click") {
        oscillator.frequency.value = 520;
        gainNode.gain.value = 0.035;
      }

      if (type === "correct") {
        oscillator.frequency.value = 760;
        gainNode.gain.value = 0.05;
      }

      if (type === "wrong") {
        oscillator.frequency.value = 180;
        gainNode.gain.value = 0.045;
      }

      if (type === "badge") {
        oscillator.frequency.value = 880;
        gainNode.gain.value = 0.055;
      }

      oscillator.type = "square";
      oscillator.start();

      setTimeout(() => {
        oscillator.stop();
      }, type === "badge" ? 220 : 120);
    }

    function money(num) {
      return Number(num).toLocaleString("ko-KR") + "원";
    }

    function parseMoney(value) {
      return Number(
        String(value)
          .replaceAll(",", "")
          .replaceAll("원", "")
          .replace("+", "")
          .trim()
      );
    }

    function updateScore() {
      scoreNow.textContent = score;
      fairyNow.textContent = fairyName || "준비 중";
    }

    function progressHTML(active) {
      const steps = ["시작", "스토리", "도전", "선택 활동", "정리"];
      return `
        <div class="progress">
          ${steps
            .map(
              (step, index) =>
                `<div class="${index === active ? "on" : ""}">${step}</div>`
            )
            .join("")}
        </div>
      `;
    }

    function conceptHelpHTML() {
      return `
        <div class="concept-grid">
          <div class="term">합리적 선택</div>
          <div>여러 대안의 편익과 비용을 분석해 가장 적은 비용으로 가장 큰 순편익을 얻게 선택하는 것</div>

          <div class="term">편익</div>

    function useHint() {
      const data = missions[currentMission];
      const count = missionHintCount[currentMission];

      if (missionCalcChecked[currentMission]) {
        document.getElementById("calcFeedback").innerHTML = `

        playTone("wrong");

      if (count >= 2) {
        document.getElementById("calcFeedback").innerHTML = `

          </div>
        `;
        playTone("wrong");
        return;
      }

      if (count === 0) {
        data.options.forEach((option, index) => {
          document.getElementById(`implicit-${index}`).value = option.implicit;
        });

        missionHintCount[currentMission] += 1;
        document.getElementById("hintCountView").textContent = missionHintCount[currentMission];

        document.getElementById("calcFeedback").innerHTML = `
          <div class="feedback">
            힌트 1 사용: 암묵적 비용 칸을 채웠습니다. 이제 기회비용과 순편익을 계산해 보세요.
          </div>
        `;
      } else if (count === 1) {
        data.options.forEach((option, index) => {
          document.getElementById(`opportunity-${index}`).value = option.opportunity;
        });

        missionHintCount[currentMission] += 1;
        document.getElementById("hintCountView").textContent = missionHintCount[currentMission];

        document.getElementById("calcFeedback").innerHTML = `
          <div class="feedback">

          </div>
        `;
      }

      playTone("click");
    }

    function getCalculationPointByHint(hintCount) {
      if (hintCount === 0) return 5;
      if (hintCount === 1) return 3;
      if (hintCount === 2) return 1;
      return 0;
    }

    function checkMissionCalculation() {
      const data = missions[currentMission];
      let allCorrect = true;
      let answerRows = "";

      const firstCheck = !missionCalcChecked[currentMission];

      data.options.forEach((option, index) => {
        const implicitInput = parseMoney(document.getElementById(`implicit-${index}`).value);
        const opportunityInput = parseMoney(document.getElementById(`opportunity-${index}`).value);
        const netInput = parseMoney(document.getElementById(`net-${index}`).value);

        const correct =
          implicitInput === option.implicit &&
          opportunityInput === option.opportunity &&
          netInput === option.net;

        if (!correct) {
          allCorrect = false;
        }

        answerRows += `
          <tr>
            <td>${option.name}</td>
            <td>${money(option.implicit)}</td>
            <td>${money(option.opportunity)}</td>
            <td>${money(option.net)}</td>
            <td>${correct ? "정답" : "오답"}</td>
          </tr>
        `;
      });

      missionCalcChecked[currentMission] = true;

      let gainedPoint = 0;

      if (firstCheck && allCorrect && !missionCalcDone[currentMission]) {
        gainedPoint = getCalculationPointByHint(missionHintCount[currentMission]);
        score += gainedPoint;
        missionCalcDone[currentMission] = true;
        updateScore();
      }

      playTone(allCorrect ? "correct" : "wrong");

      let feedbackTitle = "";

      if (firstCheck && allCorrect) {
        feedbackTitle = `계산이 정확합니다. +${gainedPoint} POINT`;
      } else if (firstCheck && !allCorrect) {
        feedbackTitle = "오답입니다. 정답을 확인한 뒤 선택 단계로 넘어갈 수 있습니다. 계산 포인트는 획득하지 못했습니다.";
      } else if (!firstCheck && allCorrect) {
        feedbackTitle = "계산은 맞지만, 이미 확인한 미션이므로 추가 포인트는 없습니다.";
      } else {
        feedbackTitle = "정답표를 참고해 복습해 보세요. 추가 포인트는 없습니다.";
      }

      document.getElementById("calcFeedback").innerHTML = `
        <div class="feedback ${allCorrect ? "good" : "bad"}">
          <strong>${feedbackTitle}</strong>
          <table>
            <tr>
              <th>선택지</th>
              <th>암묵적 비용 정답</th>
              <th>기회비용 정답</th>
              <th>순편익 정답</th>
              <th>나의 계산</th>
            </tr>
            ${answerRows}
          </table>
          <p>
            계산 점수는 첫 번째 확인 결과만 반영됩니다. 이제 정답표를 참고하여 해련이에게 제안할 선택지를 골라 보세요.
          </p>
        </div>
      `;
    }

    function chooseMission(index) {
      const data = missions[currentMission];
      const option = data.options[index];

      if (!missionCalcChecked[currentMission]) {
        playTone("wrong");

        document.getElementById("choiceFeedback").innerHTML = `
          <div class="feedback bad">
            먼저 계산 확인하기를 눌러 자신의 계산을 점검한 뒤, 해련이에게 선택을 제안해 주세요.
          </div>
        `;
        return;
      }

      data.options.forEach((_, i) => {
        const btn = document.getElementById(`choice-${i}`);
        btn.classList.remove("selected-good", "selected-bad");
      });

      const selectedBtn = document.getElementById(`choice-${index}`);
      selectedBtn.classList.add(option.rational ? "selected-good" : "selected-bad");

      if (option.rational && !missionChoiceDone[currentMission]) {
        score += 10;
        missionChoiceDone[currentMission] = true;
        updateScore();
      } else {
        missionChoiceDone[currentMission] = true;
      }

      playTone(option.rational ? "correct" : "wrong");

      const nextButton =
        currentMission < missions.length - 1
          ? `<button onclick="nextMission()">다음 도전과제로 이동</button>`
          : `<button onclick="showReviewQuestion(0)">정리 질문으로 이동</button>`;

      document.getElementById("choiceFeedback").innerHTML = `
        <div class="feedback ${option.rational ? "good" : "bad"}">
          <p><strong>${option.rational ? "+10 POINT 획득" : "포인트를 얻지 못했습니다."}</strong></p>
          <p>${option.feedback}</p>
          <p>${fairyName}이/가 해련이에게 제안할 수 있는 가장 합리적인 선택은 <strong>${data.best}</strong>입니다.</p>
          <div class="button-row">${nextButton}</div>
        </div>
      `;
    }

      currentMission += 1;

    }

    function showReviewQuestion(qIndex) {
      playTone("click");

      const q = reviewQuestions[qIndex];

      let buttons = "";
      q.choices.forEach((choice, index) => {
        buttons += `
          <button class="choice-btn" id="review-${index}" onclick="answerReview(${qIndex}, ${index})">
            ${choice.text}
          </button>
        `;
      });

      screen.innerHTML = `
        ${progressHTML(4)}
        <div class="challenge-label">도전과제 5 | 질문으로 확장하기</div>
        <h2>활동 정리</h2>
        <div class="story-box">
          <p><strong>질문 ${qIndex + 1}.</strong> ${q.question}</p>
        </div>

        <div class="choice-list">
          ${buttons}
        </div>

        <div id="reviewFeedback"></div>
      `;
    }

    function answerReview(qIndex, choiceIndex) {
      const q = reviewQuestions[qIndex];
      const choice = q.choices[choiceIndex];

      q.choices.forEach((_, i) => {
        const btn = document.getElementById(`review-${i}`);
        btn.classList.remove("selected-good", "selected-bad");
      });

      const selected = document.getElementById(`review-${choiceIndex}`);
      selected.classList.add(choice.correct ? "selected-good" : "selected-bad");

      if (choice.correct && !reviewAnswered[qIndex]) {
        score += q.points;
        reviewAnswered[qIndex] = true;
        updateScore();
      } else {
        reviewAnswered[qIndex] = true;
      }

      playTone(choice.correct ? "correct" : "wrong");

      const next =
        qIndex < reviewQuestions.length - 1
          ? `<button onclick="showReviewQuestion(${qIndex + 1})">다음 질문</button>`
          : `<button onclick="showFinal()">최종 점수 확인하기</button>`;

      document.getElementById("reviewFeedback").innerHTML = `
        <div class="feedback ${choice.correct ? "good" : "bad"}">
          <p>${choice.correct ? `선택이 저장되었습니다. +${q.points} POINT` : "선택이 저장되었습니다."}</p>
          <div class="button-row">${next}</div>
        </div>
      `;
    }

    function getBadge(scoreValue) {
      if (scoreValue >= 42) {
        return {
          name: "합리적 선택 요정",
          icon: "🏆",
          message: "편익, 기회비용, 매몰 비용을 종합해 해련이의 선택을 매우 잘 도왔습니다."
        };
      }

      if (scoreValue >= 28) {
        return {
          name: "성장 중인 선택 요정",
          icon: "🌱",
          message: "합리적 선택의 방향을 이해했습니다. 암묵적 비용과 순편익 계산을 조금 더 연습하면 좋습니다."
        };
      }

      return {
        name: "아기 선택 요정",
        icon: "🍼",
        message: "선택 요정으로 첫걸음을 시작했습니다. 명시적 비용뿐 아니라 포기한 대안의 가치도 함께 살펴보면 좋습니다."
      };
    }

    function showFinal() {
      playTone("click");

      const badge = getBadge(score);
      saveRanking();

      screen.innerHTML = `
        ${progressHTML(4)}
        <h2>최종 점수 확인</h2>
        <p>
          ${fairyName}님의 선택 활동 결과를 확인합니다.
        </p>

        <div class="score-big">
          <span id="animatedScore">0</span> / ${MAX_SCORE} POINT
        </div>

        <div class="gauge-wrap">
          <div id="gauge" class="gauge"></div>
        </div>

        <div id="badgeBox" class="badge">
          ${badge.icon} ${badge.name}
        </div>

        <div id="finalMessage" class="story-box" style="display:none;">
          <p>${badge.message}</p>
          <p>
            합리적 선택은 여러 대안의 편익과 기회비용을 비교하여 순편익이 가장 큰 대안을 선택하는 과정입니다.
            이미 지출하여 회수할 수 없는 매몰 비용에 얽매이지 않는 태도도 중요합니다.
          </p>
        </div>

        <div class="button-row" id="finalButtons" style="display:none;">
          <button onclick="showRanking()">리더보드 보기</button>
          <button class="ghost-btn" onclick="startScreen()">처음으로 돌아가기</button>
        </div>
      `;

      animateScore(score);
    }

    function animateScore(finalScore) {
      const scoreText = document.getElementById("animatedScore");
      const gauge = document.getElementById("gauge");
      const badgeBox = document.getElementById("badgeBox");
      const finalMessage = document.getElementById("finalMessage");
      const finalButtons = document.getElementById("finalButtons");

      let current = 0;

      const interval = setInterval(() => {
        if (current >= finalScore) {
          clearInterval(interval);

          setTimeout(() => {
            badgeBox.style.display = "block";
            finalMessage.style.display = "block";
            finalButtons.style.display = "flex";
            playTone("badge");
          }, 450);

          return;
        }

        current += 1;
        scoreText.textContent = current;
      }, 30);

      setTimeout(() => {
        const percent = Math.min(100, (finalScore / MAX_SCORE) * 100);
        gauge.style.width = percent + "%";
      }, 150);
    }

    function saveRanking() {
      const badge = getBadge(score);

      const record = {
        nickname: fairyName,
        score,
        badge: badge.name,
        date: new Date().toLocaleString("ko-KR")
      };

      const old = JSON.parse(localStorage.getItem("choiceFairyRanking") || "[]");
      old.push(record);
      old.sort((a, b) => b.score - a.score);
      localStorage.setItem("choiceFairyRanking", JSON.stringify(old.slice(0, 10)));
    }

    function showRanking() {
      playTone("click");

      const list = JSON.parse(localStorage.getItem("choiceFairyRanking") || "[]");

      const rows = list
        .map(
          (item, index) => `
            <tr>
              <td>${index + 1}</td>
              <td>${item.nickname}</td>
              <td>${item.score}점</td>
              <td>${item.badge}</td>
            </tr>
          `
        )
        .join("");

      screen.innerHTML = `
        ${progressHTML(4)}
        <h2>리더보드</h2>
        <p class="small">
          이 리더보드는 현재 기기와 브라우저에 저장된 일회성 기록입니다.
        </p>

        <table class="ranking-table">
          <tr>
            <th>순위</th>
            <th>요정 이름</th>
            <th>점수</th>
            <th>배지</th>
          </tr>
          ${rows || `<tr><td colspan="4">아직 기록이 없습니다.</td></tr>`}
        </table>

        <div class="button-row">
          <button onclick="startScreen()">처음으로 돌아가기</button>
          <button class="ghost-btn" onclick="clearRanking()">리더보드 초기화</button>
        </div>
      `;
    }

    function clearRanking() {
      if (confirm("현재 기기의 리더보드 기록을 지울까요?")) {
        localStorage.removeItem("choiceFairyRanking");
        showRanking();
      }
    }

    startScreen();
  </script>
</body>
</html>
