<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>선택 요정이 되어 해련이의 합리적 선택을 도와라!</title>

  <style>
    :root {
      --bg: #f7f3ea;
      --card: #fffdf8;
      --line: #222222;
      --soft: #efe4d0;
      --soft2: #f8f1e6;
      --text: #222222;
      --good: #dcefd8;
      --bad: #f1d6d6;
      --bar: #3f3a34;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 18px 44px;
    }

    .top {
      border: 3px solid var(--line);
      background: var(--card);
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 5px 5px 0 var(--line);
    }

    .project-label {
      display: inline-block;
      border: 2px solid var(--line);
      background: var(--soft);
      padding: 6px 10px;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.3;
    }

    .sub {
      margin: 10px 0 0;
      line-height: 1.7;
      font-size: 15px;
    }

    .layout {
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 18px;
      align-items: start;
    }

    .side {
      border: 3px solid var(--line);
      background: var(--card);
      padding: 16px;
      box-shadow: 5px 5px 0 var(--line);
      position: sticky;
      top: 18px;
    }

    .character-frame {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 3px solid var(--line);
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .character-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .fallback-character {
      font-size: 64px;
      display: none;
    }

    .name-tag {
      margin-top: 10px;
      border: 2px solid var(--line);
      background: var(--soft);
      padding: 8px;
      text-align: center;
      font-weight: 800;
    }

    .score-mini {
      margin-top: 12px;
      border: 2px solid var(--line);
      padding: 10px;
      text-align: center;
      background: var(--soft2);
      font-weight: 800;
    }

    .score-mini strong {
      display: block;
      font-size: 28px;
      margin-top: 4px;
    }

    .card {
      border: 3px solid var(--line);
      background: var(--card);
      padding: 20px;
      box-shadow: 5px 5px 0 var(--line);
      min-height: 560px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 25px;
    }

    h3 {
      margin: 18px 0 10px;
      font-size: 19px;
    }

    p {
      line-height: 1.75;
    }

    .speech {
      border: 3px solid var(--line);
      background: white;
      padding: 16px;
      margin: 14px 0;
      line-height: 1.75;
    }

    .story-box,
    .info-box {
      border: 2px solid var(--line);
      background: var(--soft2);
      padding: 15px;
      margin: 14px 0;
      line-height: 1.75;
    }

    .notice {
      display: inline-block;
      border: 2px solid var(--line);
      background: var(--soft);
      padding: 6px 10px;
      font-weight: 800;
      margin-top: 8px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 18px 0;
    }

    input {
      border: 2px solid var(--line);
      background: white;
      padding: 12px;
      font-size: 16px;
      font-family: inherit;
      min-width: 220px;
    }

    button {
      cursor: pointer;
      border: 3px solid var(--line);
      background: var(--soft);
      padding: 11px 15px;
      font-family: inherit;
      font-weight: 800;
      font-size: 15px;
      box-shadow: 3px 3px 0 var(--line);
    }

    button:hover {
      transform: translate(1px, 1px);
      box-shadow: 2px 2px 0 var(--line);
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .ghost-btn {
      background: white;
    }

    details {
      border: 2px solid var(--line);
      background: white;
      margin: 14px 0;
      padding: 12px;
    }

    summary {
      cursor: pointer;
      font-weight: 900;
      font-size: 16px;
    }

    .concept-grid {
      display: grid;
      grid-template-columns: 150px 1fr;
      border-top: 2px solid var(--line);
      border-left: 2px solid var(--line);
      margin-top: 12px;
    }

    .concept-grid div {
      border-right: 2px solid var(--line);
      border-bottom: 2px solid var(--line);
      padding: 10px;
      line-height: 1.6;
    }

    .concept-grid .term {
      background: var(--soft2);
      font-weight: 800;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      background: white;
      font-size: 14px;
    }

    th,
    td {
      border: 2px solid var(--line);
      padding: 8px;
      text-align: center;
      vertical-align: middle;
    }

    th {
      background: var(--soft);
    }

    td input {
      width: 100%;
      min-width: 80px;
      padding: 8px;
      text-align: center;
      font-size: 14px;
    }

    .feedback {
      border: 3px solid var(--line);
      padding: 14px;
      margin: 14px 0;
      line-height: 1.7;
      background: white;
    }

    .feedback.good {
      background: var(--good);
    }

    .feedback.bad {
      background: var(--bad);
    }

    .choice-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .choice-btn {
      width: 100%;
      text-align: left;
      background: white;
      box-shadow: none;
      border: 2px solid var(--line);
      line-height: 1.7;
    }

    .choice-btn.selected-good {
      background: var(--good);
      border-width: 3px;
    }

    .choice-btn.selected-bad {
      background: var(--bad);
      border-width: 3px;
    }

    .progress {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-bottom: 18px;
    }

    .progress div {
      border: 2px solid var(--line);
      padding: 7px;
      background: white;
      text-align: center;
      font-size: 12px;
      font-weight: 800;
    }

    .progress .on {
      background: var(--soft);
    }

    .gauge-wrap {
      margin: 28px 0 16px;
      border: 3px solid var(--line);
      background: white;
      padding: 8px;
    }

    .gauge {
      height: 32px;
      width: 0%;
      background: var(--bar);
      transition: width 1.5s ease-out;
    }

    .score-big {
      text-align: center;
      font-size: 34px;
      font-weight: 900;
      margin: 18px 0;
    }

    .badge {
      display: none;
      text-align: center;
      border: 3px solid var(--line);
      background: var(--soft);
      padding: 18px;
      margin: 18px 0;
      font-size: 24px;
      font-weight: 900;
      animation: pop 0.45s ease-out;
    }

    @keyframes pop {
      0% {
        transform: scale(0.85);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .ranking-table {
      margin-top: 14px;
    }

    .small {
      font-size: 14px;
      color: #555;
    }

    @media (max-width: 760px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .side {
        position: static;
      }

      .character-frame {
        max-width: 180px;
        margin: 0 auto;
      }

      h1 {
        font-size: 24px;
      }

      .progress {
        grid-template-columns: repeat(2, 1fr);
      }

      table {
        font-size: 12px;
      }

      th,
      td {
        padding: 5px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <section class="top">
      <div class="project-label">창의문제해결 프로젝트</div>
      <h1>선택 요정이 되어 해련이의 합리적 선택을 도와라!</h1>
      <p class="sub">
        고등학교 경제 과목 「경제생활과 합리적 선택」 모의 선택 활동 게임
      </p>
    </section>

    <div class="layout">
      <aside class="side">
        <div class="character-frame">
          <img src="images/haeryeon.png" alt="해련이 캐릭터" onerror="this.style.display='none'; document.querySelector('.fallback-character').style.display='block';">
          <div class="fallback-character">👓</div>
        </div>
        <div class="name-tag">해련</div>
        <div class="score-mini">
          POINT
          <strong id="scoreNow">0</strong>
        </div>
      </aside>

      <main id="screen" class="card"></main>
    </div>
  </div>

  <script>
    const MAX_SCORE = 40;

    let nickname = "";
    let score = 0;
    let currentMission = 0;
    let missionCalcDone = [false, false];
    let missionChoiceDone = [false, false];
    let reviewAnswered = [false, false, false];

    const missions = [
      {
        title: "선택 상황 1 | 소중한 내 아침 식사는?",
        story:
          "해련이는 아침을 먹지 못하고 등교해, 편의점에서 간단한 아침 식사를 하려고 한다. 세 가지 선택지 중 가장 합리적인 선택을 찾아 해련이에게 제안해 보자.",
        best: "삼각김밥",
        options: [
          {
            name: "삼각김밥",
            benefit: 4500,
            explicit: 2500,
            implicit: 1500,
            opportunity: 4000,
            net: 500,
            rational: true,
            feedback:
              "삼각김밥은 명시적 비용이 가장 크지만 순편익이 +500원으로 가장 크다. 따라서 이 상황에서는 가장 합리적인 선택으로 볼 수 있다."
          },
          {
            name: "맥반석 계란",
            benefit: 3000,
            explicit: 1500,
            implicit: 2000,
            opportunity: 3500,
            net: -500,
            rational: false,
            feedback:
              "맥반석 계란은 돈을 덜 쓰는 선택처럼 보이지만 순편익이 -500원이다. 가격만으로 합리성을 판단하기 어렵다."
          },
          {
            name: "굶기",
            benefit: 500,
            explicit: 0,
            implicit: 2000,
            opportunity: 2000,
            net: -1500,
            rational: false,
            feedback:
              "굶기는 명시적 비용이 없지만, 배고픔과 수업 집중력 저하라는 포기 비용이 크다. 가장 싼 선택이 항상 합리적인 것은 아니다."
          }
        ]
      },
      {
        title: "선택 상황 2 | 영화관을 나갈까, 말까?",
        story:
          "해련이는 친구와 영화를 보러 갔는데, 영화가 30분쯤 지나자 너무 재미없다. 이미 낸 영화표 8,000원의 환불은 불가능하다. 매몰 비용의 의미를 떠올려 두 가지 선택지를 비교해 보자.",
        notice:
          "이미 낸 영화표 8,000원은 매몰 비용이므로 현재 선택을 판단할 때 얽매여서는 안 된다.",
        best: "보지 않고 나오기",
        options: [
          {
            name: "끝까지 보기",
            benefit: 5000,
            explicit: 0,
            implicit: 8000,
            opportunity: 8000,
            net: -3000,
            rational: false,
            feedback:
              "끝까지 보기는 이미 낸 돈이 아깝다는 생각에 끌린 선택이지만, 영화표 값은 매몰 비용이다. 현재 선택에서는 앞으로의 편익과 기회비용을 비교해야 한다."
          },
          {
            name: "보지 않고 나오기",
            benefit: 8000,
            explicit: 0,
            implicit: 5000,
            opportunity: 5000,
            net: 3000,
            rational: true,
            feedback:
              "보지 않고 나오기는 이미 낸 돈에 얽매이지 않고 앞으로의 시간 활용을 고려한 선택이다. 순편익이 +3,000원으로 가장 크다."
          }
        ]
      }
    ];

    const reviewQuestions = [
      {
        question: "가장 싼 선택이 항상 합리적인 선택일까?",
        points: 4,
        choices: [
          {
            text: "그렇다. 돈을 가장 적게 쓰는 선택이므로 항상 합리적이다.",
            correct: false
          },
          {
            text: "아니다. 편익과 기회비용을 함께 비교했을 때 순편익이 가장 큰 선택이 합리적이다.",
            correct: true
          }
        ]
      },
      {
        question: "이미 쓴 돈이 아깝다는 이유로 계속 선택을 유지하는 것은 합리적일까?",
        points: 3,
        choices: [
          {
            text: "아니다. 이미 회수할 수 없는 매몰 비용에 얽매이지 않고 현재의 편익과 기회비용을 비교해야 한다.",
            correct: true
          },
          {
            text: "그렇다. 이미 돈을 냈다면 손해를 보지 않기 위해 반드시 끝까지 유지해야 한다.",
            correct: false
          }
        ]
      },
      {
        question: "해련이의 상황이 바뀐다면 합리적 선택도 달라질 수 있을까?",
        points: 3,
        choices: [
          {
            text: "그렇다. 가진 용돈, 시간, 새로운 선택지 등 조건이 달라지면 순편익도 달라질 수 있다.",
            correct: true
          },
          {
            text: "아니다. 한 번 합리적인 선택으로 정해진 것은 어떤 상황에서도 항상 그대로 유지된다.",
            correct: false
          }
        ]
      }
    ];

    const screen = document.getElementById("screen");
    const scoreNow = document.getElementById("scoreNow");

    function money(num) {
      return Number(num).toLocaleString("ko-KR") + "원";
    }

    function parseMoney(value) {
      return Number(String(value).replaceAll(",", "").replaceAll("원", "").replace("+", "").trim());
    }

    function updateScore() {
      scoreNow.textContent = score;
    }

    function progressHTML(active) {
      const steps = ["시작", "스토리", "튜토리얼", "선택 활동", "정리"];
      return `
        <div class="progress">
          ${steps.map((step, index) => `<div class="${index === active ? "on" : ""}">${step}</div>`).join("")}
        </div>
      `;
    }

    function startScreen() {
      updateScore();
      screen.innerHTML = `
        ${progressHTML(0)}
        <h2>프로젝트 안내</h2>
        <div class="story-box">
          <p>
            이 웹 활동은 창의문제해결 프로젝트의 일환으로 제작한
            고등학교 경제 과목 「경제생활과 합리적 선택」 모의 선택 활동 게임입니다.
          </p>
          <p>
            학생은 해련이의 선택 요정이 되어 각 선택의 편익, 명시적 비용, 암묵적 비용,
            기회비용, 순편익을 비교하고 가장 합리적인 선택을 제안합니다.
          </p>
        </div>

        <h3>닉네임 입력</h3>
        <div class="input-row">
          <input id="nicknameInput" placeholder="닉네임을 입력하세요" maxlength="12" />
          <button onclick="saveNickname()">시작하기</button>
        </div>

        <p class="small">
          닉네임은 최종 점수와 일회성 랭킹 표시에 사용됩니다.
        </p>
      `;
    }

    function saveNickname() {
      const input = document.getElementById("nicknameInput").value.trim();

      if (!input) {
        alert("닉네임을 입력한 뒤 시작해 주세요.");
        return;
      }

      nickname = input;
      score = 0;
      currentMission = 0;
      missionCalcDone = [false, false];
      missionChoiceDone = [false, false];
      reviewAnswered = [false, false, false];
      updateScore();
      storyOne();
    }

    function storyOne() {
      screen.innerHTML = `
        ${progressHTML(1)}
        <h2>해련이의 고민</h2>
        <div class="speech">
          “나는 평소 계획 없이 소비하거나 충동적으로 물건을 사서 용돈 관리가 어려워.”
        </div>
        <div class="speech">
          “오늘도 여러 선택을 해야 하는데, 어떤 선택이 더 합리적인지 잘 모르겠어.”
        </div>
        <div class="button-row">
          <button onclick="storyTwo()">다음</button>
        </div>
      `;
    }

    function storyTwo() {
      screen.innerHTML = `
        ${progressHTML(1)}
        <h2>선택 요정 미션</h2>
        <div class="speech">
          “${nickname} 선택 요정! 내 선택의 편익과 기회비용을 따져 가장 합리적인 선택을 도와줘.”
        </div>

        <details>
          <summary>경제 개념 도움말 열기 / 닫기</summary>
          ${conceptHelpHTML()}
        </details>

        <div class="button-row">
          <button onclick="tutorialOne()">튜토리얼 시작하기</button>
        </div>
      `;
    }

    function conceptHelpHTML() {
      return `
        <div class="concept-grid">
          <div class="term">합리적 선택</div>
          <div>여러 대안의 편익과 비용을 분석해 가장 적은 비용으로 가장 큰 순편익을 얻게 선택하는 것</div>

          <div class="term">편익</div>
          <div>어떤 선택을 통해 얻게 되는 만족이나 이익</div>

          <div class="term">명시적 비용</div>
          <div>선택을 위해 실제로 지불하는 비용</div>

          <div class="term">암묵적 비용</div>
          <div>선택하지 않은 대안 중 가장 가치 있는 대안의 가치</div>

          <div class="term">기회비용</div>
          <div>명시적 비용 + 암묵적 비용</div>

          <div class="term">매몰 비용</div>
          <div>이미 지출하여 다시 회수할 수 없는 비용</div>

          <div class="term">순편익</div>
          <div>편익 - 기회비용</div>
        </div>
      `;
    }

    function tutorialOne() {
      screen.innerHTML = `
        ${progressHTML(2)}
        <h2>튜토리얼 1 | 선택지 자체의 가치 구하기</h2>
        <p>
          선택지 자체의 가치는 편익에서 명시적 비용을 뺀 값입니다.
        </p>
        <div class="info-box">
          선택지 자체의 가치 = 편익 - 명시적 비용
        </div>

        <table>
          <tr>
            <th>선택지</th>
            <th>편익</th>
            <th>명시적 비용</th>
            <th>선택지 자체의 가치</th>
          </tr>
          <tr>
            <td>만화책</td>
            <td>4,000원</td>
            <td>2,500원</td>
            <td>1,500원</td>
          </tr>
          <tr>
            <td>경제 문제집</td>
            <td>6,000원</td>
            <td>3,000원</td>
            <td>3,000원</td>
          </tr>
        </table>

        <div class="button-row">
          <button onclick="tutorialTwo()">다음</button>
        </div>
      `;
    }

    function tutorialTwo() {
      screen.innerHTML = `
        ${progressHTML(2)}
        <h2>튜토리얼 2 | 암묵적 비용 찾기</h2>
        <p>
          암묵적 비용은 내가 선택하지 않은 대안 중 가장 가치 있는 대안의 가치입니다.
        </p>

        <table>
          <tr>
            <th>내가 선택한 대안</th>
            <th>포기한 대안 중 가장 가치 있는 것</th>
            <th>암묵적 비용</th>
          </tr>
          <tr>
            <td>만화책</td>
            <td>경제 문제집</td>
            <td>3,000원</td>
          </tr>
          <tr>
            <td>경제 문제집</td>
            <td>만화책</td>
            <td>1,500원</td>
          </tr>
        </table>

        <div class="button-row">
          <button onclick="tutorialThree()">다음</button>
        </div>
      `;
    }

    function tutorialThree() {
      screen.innerHTML = `
        ${progressHTML(2)}
        <h2>튜토리얼 3 | 기회비용과 순편익 계산하기</h2>
        <div class="info-box">
          기회비용 = 명시적 비용 + 암묵적 비용<br />
          순편익 = 편익 - 기회비용
        </div>

        <table>
          <tr>
            <th>선택지</th>
            <th>편익</th>
            <th>명시적 비용</th>
            <th>암묵적 비용</th>
            <th>기회비용</th>
            <th>순편익</th>
          </tr>
          <tr>
            <td>만화책</td>
            <td>4,000원</td>
            <td>2,500원</td>
            <td>3,000원</td>
            <td>5,500원</td>
            <td>-1,500원</td>
          </tr>
          <tr>
            <td>경제 문제집</td>
            <td>6,000원</td>
            <td>3,000원</td>
            <td>1,500원</td>
            <td>4,500원</td>
            <td>+1,500원</td>
          </tr>
        </table>

        <div class="feedback good">
          따라서 예시 상황에서 합리적 선택은 순편익이 더 큰 경제 문제집입니다.
        </div>

        <div class="button-row">
          <button onclick="showMission()">모의 선택 활동 시작하기</button>
        </div>
      `;
    }

    function showMission() {
      const data = missions[currentMission];

      let rows = "";
      data.options.forEach((option, index) => {
        rows += `
          <tr>
            <td>${option.name}</td>
            <td>${money(option.benefit)}</td>
            <td>${money(option.explicit)}</td>
            <td><input id="implicit-${index}" placeholder="입력" /></td>
            <td><input id="opportunity-${index}" placeholder="입력" /></td>
            <td><input id="net-${index}" placeholder="입력" /></td>
          </tr>
        `;
      });

      let choiceButtons = "";
      data.options.forEach((option, index) => {
        choiceButtons += `
          <button class="choice-btn" id="choice-${index}" onclick="chooseMission(${index})">
            ${option.name}을/를 제안한다.
          </button>
        `;
      });

      screen.innerHTML = `
        ${progressHTML(3)}
        <h2>${data.title}</h2>
        <div class="story-box">
          <p>${data.story}</p>
          ${data.notice ? `<p class="notice">${data.notice}</p>` : ""}
        </div>

        <details>
          <summary>경제 개념 도움말 열기 / 닫기</summary>
          ${conceptHelpHTML()}
        </details>

        <h3>1단계 | 계산 미션</h3>
        <p>
          편익과 명시적 비용을 바탕으로 암묵적 비용, 기회비용, 순편익을 계산해 보세요.
        </p>

        <table>
          <tr>
            <th>선택지</th>
            <th>편익</th>
            <th>명시적 비용</th>
            <th>암묵적 비용</th>
            <th>기회비용</th>
            <th>순편익</th>
          </tr>
          ${rows}
        </table>

        <div class="button-row">
          <button onclick="checkMissionCalculation()">계산 확인하기</button>
          <button class="ghost-btn" onclick="fillExampleHint()">힌트 보기</button>
        </div>

        <div id="calcFeedback"></div>

        <h3>2단계 | 해련이에게 제안할 선택</h3>
        <div class="choice-list">
          ${choiceButtons}
        </div>

        <div id="choiceFeedback"></div>
      `;
    }

    function fillExampleHint() {
      document.getElementById("calcFeedback").innerHTML = `
        <div class="feedback">
          먼저 선택지 자체의 가치를 비교해 보세요. 그리고 내가 어떤 선택을 했을 때 포기하게 되는 대안 중 가장 가치 있는 것을 암묵적 비용으로 보면 됩니다.
        </div>
      `;
    }

    function checkMissionCalculation() {
      const data = missions[currentMission];
      let allCorrect = true;
      let answerRows = "";

      data.options.forEach((option, index) => {
        const implicitInput = parseMoney(document.getElementById(`implicit-${index}`).value);
        const opportunityInput = parseMoney(document.getElementById(`opportunity-${index}`).value);
        const netInput = parseMoney(document.getElementById(`net-${index}`).value);

        const correct =
          implicitInput === option.implicit &&
          opportunityInput === option.opportunity &&
          netInput === option.net;

        if (!correct) allCorrect = false;

        answerRows += `
          <tr>
            <td>${option.name}</td>
            <td>${money(option.implicit)}</td>
            <td>${money(option.opportunity)}</td>
            <td>${money(option.net)}</td>
            <td>${correct ? "확인 완료" : "다시 확인"}</td>
          </tr>
        `;
      });

      if (allCorrect && !missionCalcDone[currentMission]) {
        score += 5;
        missionCalcDone[currentMission] = true;
        updateScore();
      }

      document.getElementById("calcFeedback").innerHTML = `
        <div class="feedback ${allCorrect ? "good" : "bad"}">
          <strong>${allCorrect ? "계산이 정확합니다. +5 POINT" : "아직 다른 값이 있습니다. 표를 보고 다시 비교해 보세요."}</strong>
          <table>
            <tr>
              <th>선택지</th>
              <th>암묵적 비용</th>
              <th>기회비용</th>
              <th>순편익</th>
              <th>확인</th>
            </tr>
            ${answerRows}
          </table>
        </div>
      `;
    }

    function chooseMission(index) {
      const data = missions[currentMission];
      const option = data.options[index];

      if (!missionCalcDone[currentMission]) {
        document.getElementById("choiceFeedback").innerHTML = `
          <div class="feedback bad">
            먼저 계산을 정확히 확인한 뒤 해련이에게 선택을 제안해 주세요.
          </div>
        `;
        return;
      }

      data.options.forEach((_, i) => {
        const btn = document.getElementById(`choice-${i}`);
        btn.classList.remove("selected-good", "selected-bad");
      });

      const selectedBtn = document.getElementById(`choice-${index}`);
      selectedBtn.classList.add(option.rational ? "selected-good" : "selected-bad");

      if (option.rational && !missionChoiceDone[currentMission]) {
        score += 10;
        missionChoiceDone[currentMission] = true;
        updateScore();
      } else {
        missionChoiceDone[currentMission] = true;
      }

      const nextButton = currentMission < missions.length - 1
        ? `<button onclick="nextMission()">다음 선택 상황으로 이동</button>`
        : `<button onclick="showReviewQuestion(0)">정리 질문으로 이동</button>`;

      document.getElementById("choiceFeedback").innerHTML = `
        <div class="feedback ${option.rational ? "good" : "bad"}">
          <p><strong>${option.rational ? "+10 POINT 획득" : "포인트를 얻지 못했습니다."}</strong></p>
          <p>${option.feedback}</p>
          <p>이 상황에서 순편익이 가장 큰 선택은 <strong>${data.best}</strong>입니다.</p>
          <div class="button-row">${nextButton}</div>
        </div>
      `;
    }

    function nextMission() {
      currentMission += 1;
      showMission();
    }

    function showReviewQuestion(qIndex) {
      const q = reviewQuestions[qIndex];

      let buttons = "";
      q.choices.forEach((choice, index) => {
        buttons += `
          <button class="choice-btn" id="review-${index}" onclick="answerReview(${qIndex}, ${index})">
            ${choice.text}
          </button>
        `;
      });

      screen.innerHTML = `
        ${progressHTML(4)}
        <h2>활동 정리 | 질문으로 확장하기</h2>
        <div class="story-box">
          <p><strong>질문 ${qIndex + 1}.</strong> ${q.question}</p>
        </div>

        <div class="choice-list">
          ${buttons}
        </div>

        <div id="reviewFeedback"></div>
      `;
    }

    function answerReview(qIndex, choiceIndex) {
      const q = reviewQuestions[qIndex];
      const choice = q.choices[choiceIndex];

      q.choices.forEach((_, i) => {
        const btn = document.getElementById(`review-${i}`);
        btn.classList.remove("selected-good", "selected-bad");
      });

      const selected = document.getElementById(`review-${choiceIndex}`);
      selected.classList.add(choice.correct ? "selected-good" : "selected-bad");

      if (choice.correct && !reviewAnswered[qIndex]) {
        score += q.points;
        reviewAnswered[qIndex] = true;
        updateScore();
      } else {
        reviewAnswered[qIndex] = true;
      }

      const next =
        qIndex < reviewQuestions.length - 1
          ? `<button onclick="showReviewQuestion(${qIndex + 1})">다음 질문</button>`
          : `<button onclick="showFinal()">최종 점수 확인하기</button>`;

      document.getElementById("reviewFeedback").innerHTML = `
        <div class="feedback ${choice.correct ? "good" : "bad"}">
          <p>${choice.correct ? `선택이 저장되었습니다. +${q.points} POINT` : "선택이 저장되었습니다."}</p>
          <div class="button-row">${next}</div>
        </div>
      `;
    }

    function getBadge(scoreValue) {
      if (scoreValue >= 35) {
        return {
          name: "합리적 선택 요정",
          icon: "🏆",
          message: "편익, 기회비용, 매몰 비용을 종합해 합리적 선택을 잘 판단했습니다."
        };
      }

      if (scoreValue >= 24) {
        return {
          name: "성장 중인 선택 요정",
          icon: "🌱",
          message: "합리적 선택의 방향을 이해했습니다. 암묵적 비용과 순편익 계산을 한 번 더 복습하면 좋습니다."
        };
      }

      return {
        name: "기회비용 다시 보기",
        icon: "🔍",
        message: "명시적 비용만 보지 말고, 포기한 대안의 가치와 매몰 비용을 함께 점검해 봅시다."
      };
    }

    function showFinal() {
      const badge = getBadge(score);

      saveRanking();

      screen.innerHTML = `
        ${progressHTML(4)}
        <h2>최종 점수 확인</h2>
        <p>
          ${nickname}님의 선택 활동 결과를 확인합니다.
        </p>

        <div class="score-big">
          <span id="animatedScore">0</span> / ${MAX_SCORE} POINT
        </div>

        <div class="gauge-wrap">
          <div id="gauge" class="gauge"></div>
        </div>

        <div id="badgeBox" class="badge">
          ${badge.icon} ${badge.name}
        </div>

        <div id="finalMessage" class="story-box" style="display:none;">
          <p>${badge.message}</p>
          <p>
            합리적 선택은 여러 대안의 편익과 기회비용을 비교하여 순편익이 가장 큰 대안을 선택하는 과정입니다.
            이미 지출하여 회수할 수 없는 매몰 비용에 얽매이지 않는 태도도 중요합니다.
          </p>
        </div>

        <div class="button-row" id="finalButtons" style="display:none;">
          <button onclick="showRanking()">랭킹 보기</button>
          <button class="ghost-btn" onclick="startScreen()">처음으로 돌아가기</button>
        </div>
      `;

      animateScore(score);
    }

    function animateScore(finalScore) {
      const scoreText = document.getElementById("animatedScore");
      const gauge = document.getElementById("gauge");
      const badgeBox = document.getElementById("badgeBox");
      const finalMessage = document.getElementById("finalMessage");
      const finalButtons = document.getElementById("finalButtons");

      let current = 0;
      const interval = setInterval(() => {
        if (current >= finalScore) {
          clearInterval(interval);

          setTimeout(() => {
            badgeBox.style.display = "block";
            finalMessage.style.display = "block";
            finalButtons.style.display = "flex";
          }, 450);

          return;
        }

        current += 1;
        scoreText.textContent = current;
      }, 35);

      setTimeout(() => {
        const percent = Math.min(100, (finalScore / MAX_SCORE) * 100);
        gauge.style.width = percent + "%";
      }, 150);
    }

    function saveRanking() {
      const badge = getBadge(score);
      const record = {
        nickname,
        score,
        badge: badge.name,
        date: new Date().toLocaleString("ko-KR")
      };

      const old = JSON.parse(localStorage.getItem("choiceFairyRanking") || "[]");
      old.push(record);
      old.sort((a, b) => b.score - a.score);
      localStorage.setItem("choiceFairyRanking", JSON.stringify(old.slice(0, 10)));
    }

    function showRanking() {
      const list = JSON.parse(localStorage.getItem("choiceFairyRanking") || "[]");

      const rows = list.map((item, index) => `
        <tr>
          <td>${index + 1}</td>
          <td>${item.nickname}</td>
          <td>${item.score}점</td>
          <td>${item.badge}</td>
        </tr>
      `).join("");

      screen.innerHTML = `
        ${progressHTML(4)}
        <h2>랭킹 보기</h2>
        <p class="small">
          이 랭킹은 현재 기기와 브라우저에 저장된 일회성 기록입니다.
        </p>

        <table class="ranking-table">
          <tr>
            <th>순위</th>
            <th>닉네임</th>
            <th>점수</th>
            <th>배지</th>
          </tr>
          ${rows || `<tr><td colspan="4">아직 기록이 없습니다.</td></tr>`}
        </table>

        <div class="button-row">
          <button onclick="startScreen()">처음으로 돌아가기</button>
          <button class="ghost-btn" onclick="clearRanking()">랭킹 초기화</button>
        </div>
      `;
    }

    function clearRanking() {
      if (confirm("현재 기기의 랭킹 기록을 지울까요?")) {
        localStorage.removeItem("choiceFairyRanking");
        showRanking();
      }
    }

    startScreen();
  </script>
</body>
</html>
